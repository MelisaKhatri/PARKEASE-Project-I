<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Login</title>

    <link rel="stylesheet" href="../css/style.css" />
  </head>

  <body class="login-page">
    <header>
      <div class="logo">
        <img src="../media/logo/logo.png" />
        ParkEase
      </div>
      <nav>
        <a href="../index.html">Home</a>
        <a href="./aboutus.html">About Us</a>
        <a href="./howitworks.html">How It Works</a>
        <a href="./popularareas.html">Popular Parking Areas</a>
        <a href="./services.html"> Services</a>
        <a href="./faq.html">FAQ</a>
        <a href="#" onclick="logout()">Logout</a>
      </nav>
    </header>

    <section class="register-container">
      <div class="login-left">
        <img src="../media/registration/login.jpg" alt="Login" />
      </div>

      <div class="register-form">
        <h1>Login</h1>

        <form onsubmit="login(event)">
          <input type="email" id="email" placeholder="Email" required />

          <input
            type="password"
            id="password"
            placeholder="Password"
            required
          />

          <a href="./forgotpassword.html" class="forgot"> Forgot Password? </a>

          <button class="button" type="submit">Login</button>
        </form>

        <p>
          Don't have an account?
          <a href="./register.html"> Register </a>
        </p>
      </div>
    </section>
    <footer>© 2026 ParkEase</footer>

    <script src="../script/login.js"></script>
  </body>
</html>
