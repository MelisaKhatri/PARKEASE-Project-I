<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ParkEase | Parking Ticket</title>

    <link rel="stylesheet" href="../css/style.css">

    <style>
        .ticket-box{
            max-width:700px;
            margin:50px auto;
            background:#fff;
            padding:30px;
            border-radius:12px;
            box-shadow:0 5px 20px rgba(0,0,0,.15);
        }

        .ticket-box h1{
            color:#2563eb;
            text-align:center;
        }

        .ticket-box hr{
            margin:20px 0;
        }

        .row{
            display:flex;
            justify-content:space-between;
            margin:12px 0;
            font-size:18px;
        }

        .success{
            color:green;
            font-weight:bold;
        }

        .btns{
            margin-top:30px;
            text-align:center;
        }

        .btns button{
            padding:12px 25px;
            margin:10px;
            border:none;
            border-radius:8px;
            cursor:pointer;
            font-size:16px;
        }

        .print{
            background:#2563eb;
            color:white;
        }

        .home{
            background:#16a34a;
            color:white;
        }

        @media print{

            header,
            footer,
            .btns{
                display:none;
            }

            body{
                background:white;
            }

            .ticket-box{
                box-shadow:none;
                border:2px solid black;
            }

        }
    </style>

</head>

<body>

<header>
    <div class="logo">
        <img src="../media/logo/logo.png">
        ParkEase
    </div>
</header>


<div class="ticket-box">

<h1>ParkEase Parking Ticket</h1>

<hr>

<div class="row">
<span>Booking ID</span>
<span id="bookingId"></span>
</div>

<div class="row">
<span>Parking</span>
<span id="parking"></span>
</div>

<div class="row">
<span>Vehicle</span>
<span id="vehicle"></span>
</div>

<div class="row">
<span>Duration</span>
<span id="duration"></span>
</div>

<div class="row">
<span>Amount Paid</span>
<span>Rs. <span id="amount"></span></span>
</div>

<div class="row">
<span>Date</span>
<span id="date"></span>
</div>

<div class="row">
<span>Time</span>
<span id="time"></span>
</div>

<div class="row">
<span>Status</span>
<span class="success">Payment Successful</span>
</div>

<hr>

<p style="text-align:center">
Thank you for using <strong>ParkEase</strong>.<br>
Please keep this ticket until you leave the parking area.
</p>

<div class="btns">

<button class="print" onclick="window.print()">
Print Ticket
</button>

<button class="home" onclick="window.location.href='./finder.html'">
Back to Finder
</button>

</div>

</div>


<footer class="footer">
<div class="footer-bottom">
Copyright © 2026 ParkEase. All Rights Reserved.
</div>
</footer>

<script>

const bookingId =
"PE" + Math.floor(100000 + Math.random()*900000);

document.getElementById("bookingId").innerHTML = bookingId;

document.getElementById("parking").innerHTML =
localStorage.getItem("parkingName");

document.getElementById("vehicle").innerHTML =
localStorage.getItem("vehicle");

document.getElementById("duration").innerHTML =
localStorage.getItem("duration");

document.getElementById("amount").innerHTML =
localStorage.getItem("amount");

const now = new Date();

document.getElementById("date").innerHTML =
now.toLocaleDateString();

document.getElementById("time").innerHTML =
now.toLocaleTimeString();

</script>

</body>
</html>
